<div class="shell">
  <aside class="shell__sidebar">
    <a class="shell__brand" routerLink="/dashboard">
      <span class="shell__brand-mark">FP</span>
      <div class="shell__brand-text">
        <span class="shell__brand-name">FinPlan</span>
        <span class="shell__brand-sub">{{ 'shell.brand.subtitle' | t }}</span>
      </div>
    </a>

    <nav class="shell__nav" aria-label="Main navigation">
      <a
        class="shell__nav-item"
        routerLink="/dashboard"
        routerLinkActive="shell__nav-item--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path
            d="M3 12.5V7.2L8 3.5l5 3.7v5.3"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.nav.dashboard' | t }}
      </a>

      <a class="shell__nav-item" routerLink="/sources" routerLinkActive="shell__nav-item--active">
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2.25v11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          <path
            d="M11.5 4.5c0-1.55-1.57-2.75-3.5-2.75S4.5 2.95 4.5 4.5 6.07 7.25 8 7.25s3.5 1.2 3.5 2.75S9.93 12.75 8 12.75 4.5 11.55 4.5 10"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.nav.sources' | t }}
      </a>

      <a
        class="shell__nav-item"
        routerLink="/expected-funds"
        routerLinkActive="shell__nav-item--active"
      >
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" />
          <path
            d="M8 5v3l2.1 1.4"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.nav.expectedFunds' | t }}
      </a>

      <a
        class="shell__nav-item"
        routerLink="/exchange-ops"
        routerLinkActive="shell__nav-item--active"
      >
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 5h8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          <path
            d="M9.5 3l2 2-2 2"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path d="M13 11H4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          <path
            d="M6.5 13l-2-2 2-2"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.nav.exchangeOps' | t }}
      </a>
    </nav>

    <div class="shell__sidebar-footer">
      <div class="shell__locale">
        <div class="shell__locale-label">
          <svg class="shell__locale-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4" />
            <path
              d="M2.5 8h11M8 2.5a9.5 9.5 0 0 1 0 11M8 2.5a9.5 9.5 0 0 0 0 11"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
          {{ 'shell.locale.label' | t }}
        </div>

        <div class="shell__locale-switch" role="group" [attr.aria-label]="'shell.locale.label' | t">
          <button
            class="shell__locale-btn"
            type="button"
            [class.shell__locale-btn--active]="locale() === 'en'"
            (click)="setLocale('en')"
          >
            EN
          </button>
          <button
            class="shell__locale-btn"
            type="button"
            [class.shell__locale-btn--active]="locale() === 'uk'"
            (click)="setLocale('uk')"
          >
            UA
          </button>
        </div>
      </div>

      <button class="shell__signout" type="button" (click)="signOut()">
        <svg class="shell__signout-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path
            d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
          />
          <path
            d="M11 11l3-3-3-3M14 8H6"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.signOut' | t }}
      </button>
    </div>
  </aside>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
