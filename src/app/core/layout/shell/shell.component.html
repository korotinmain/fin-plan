<div class="shell">
  <aside class="shell__sidebar">
    <a class="shell__brand" routerLink="/dashboard">
      <span class="shell__brand-mark">FP</span>
      <div class="shell__brand-text">
        <span class="shell__brand-name">FinPlan</span>
        <span class="shell__brand-sub">{{ 'shell.brand.subtitle' | t }}</span>
      </div>
    </a>

    <nav class="shell__nav" aria-label="Main navigation">
      <a
        class="shell__nav-item"
        routerLink="/dashboard"
        routerLinkActive="shell__nav-item--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" />
          <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" />
          <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" />
          <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" />
        </svg>
        {{ 'shell.nav.dashboard' | t }}
      </a>
      <a class="shell__nav-item" routerLink="/goals" routerLinkActive="shell__nav-item--active">
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" />
          <circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.5" />
          <circle cx="8" cy="8" r="1" fill="currentColor" />
        </svg>
        {{ 'shell.nav.goals' | t }}
      </a>
      <a class="shell__nav-item" routerLink="/currency" routerLinkActive="shell__nav-item--active">
        <svg class="shell__nav-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 1.5v13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <path
            d="M11.75 4.5c0-1.66-1.68-3-3.75-3s-3.75 1.34-3.75 3 1.68 3 3.75 3 3.75 1.34 3.75 3-1.68 3-3.75 3-3.75-1.34-3.75-3"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.nav.currency' | t }}
      </a>
    </nav>

    <div class="shell__sidebar-footer">
      <div class="shell__locale">
        <div class="shell__locale-label">
          <svg class="shell__locale-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" />
            <path
              d="M2 8h12M8 2a10 10 0 0 1 0 12M8 2a10 10 0 0 0 0 12"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
          {{ 'shell.locale.label' | t }}
        </div>
        <div class="shell__locale-switch" role="group" [attr.aria-label]="'shell.locale.label' | t">
          <button
            class="shell__locale-btn"
            type="button"
            [class.shell__locale-btn--active]="locale() === 'en'"
            (click)="setLocale('en')"
          >
            EN
          </button>
          <button
            class="shell__locale-btn"
            type="button"
            [class.shell__locale-btn--active]="locale() === 'uk'"
            (click)="setLocale('uk')"
          >
            UA
          </button>
        </div>
      </div>

      @if (user(); as u) {
        <div class="shell__user">
          <span class="shell__user-avatar">{{ initials() }}</span>
          <div class="shell__user-info">
            <span class="shell__user-email">{{ u.email }}</span>
          </div>
        </div>
      }
      <button class="shell__signout" type="button" (click)="signOut()">
        <svg class="shell__signout-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path
            d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <path
            d="M11 11l3-3-3-3M14 8H6"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        {{ 'shell.signOut' | t }}
      </button>
    </div>
  </aside>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
